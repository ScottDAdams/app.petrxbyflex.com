<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Payment</title>
<style>
  /* Fill the parent iframe so OneInc's CDK overlay (height:100%) has a stable
     box; min-height covers mobile dynamic toolbars better than height:100% alone. */
  html, body { margin: 0; padding: 0; height: 100%; min-height: 100dvh; background: transparent; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #portalOneContainer { position: relative; width: 100%; min-height: 100%; height: 100%; }
  #petrx-frame-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 14px; padding: 16px; text-align: center; }
  /* NOTE: OneInc's V2 modal — including the ONE INC header logo and the
     "Healthy Paws / a Chubb Company" footer logo — renders entirely inside a
     nested cross-origin iframe (#PortalOneFrame). Our CSS here CANNOT reach
     any of it (confirmed: a `portal-image.logo img { padding }` rule had no
     effect). Logo padding/spacing, header branding, and footer logo are all
     controlled by OneInc's modal config under the "HealthyPaws" client key —
     change requests for those go to OneInc, not here. */
</style>
</head>
<body>
  <!--
    Isolated host page for OneInc PortalOne GenericModalV2.
    Matches Healthy Paws' "/Enrollment/PaymentPage" pattern: the OneInc Angular CDK
    overlay is injected into THIS document's body, so its height:100% wrapper fills
    the iframe (not the parent app), eliminating CSS conflicts with the host React
    app. The parent app embeds this page via <iframe src="/oneinc-frame.html?..."/>
    and communicates with it via window.postMessage:
      - frame -> parent: { source: 'petrx-oneinc-frame', action: 'ready'|'loadComplete'|'paymentComplete'|'unload'|'error', ... }
      - parent -> frame: not used in V1 of this bridge (all init params come via URL query)
  -->
  <div id="portalOneContainer">
    <div id="petrx-frame-fallback">Initializing payment...</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
  (function () {
    "use strict";

    var params = new URLSearchParams(window.location.search);
    var sessionId        = params.get("sessionId") || "";
    var amount           = parseFloat(params.get("amount") || "0");
    var leadId           = params.get("leadId") || "";
    var env              = (params.get("env") || "staging").toLowerCase();
    var returnUrl        = params.get("returnUrl") || "";
    var scriptOverride   = params.get("scriptUrl") || "";
    // Optional pre-fills threaded from the launcher so the user doesn't have
    // to re-type info we already have. These map to OneInc V2 makePayment
    // params per the official "Make a Payment using React" recipe:
    //   policyHolderName  -> populates "Name On Card"
    //   billingZip        -> populates "Billing Zip"
    //   billingAddressStreet -> persisted for save-on-file; not always shown
    var policyHolderName     = params.get("policyHolderName") || "";
    var billingZip           = params.get("billingZip") || "";
    var billingAddressStreet = params.get("billingAddressStreet") || "";

    function post(action, extra) {
      try {
        var msg = { source: "petrx-oneinc-frame", action: action };
        if (extra && typeof extra === "object") {
          for (var k in extra) if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];
        }
        window.parent.postMessage(msg, "*");
      } catch (e) {
        // last-resort log only; parent is the only consumer
        console.error("[oneinc-frame] postMessage failed", e);
      }
    }

    function setFallback(text) {
      var el = document.getElementById("petrx-frame-fallback");
      if (el) el.textContent = text;
    }

    if (!sessionId) {
      setFallback("Payment is not available right now. Please refresh and try again.");
      post("error", { message: "missing sessionId in iframe query string" });
      return;
    }

    var host = (env === "prod" || env === "production")
      ? "https://portalone.processonepayments.com"
      : "https://stgportalone.processonepayments.com";
    var sdkUrl = scriptOverride || (host + "/GenericModalV2/PortalOne.js");

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = function () { resolve(); };
        s.onerror = function () { reject(new Error("Failed to load " + src)); };
        document.head.appendChild(s);
      });
    }

    // OneInc V2's SDK creates <iframe id="PortalOneFrame"> and dynamically
    // sets its style.height as the inner OneInc page posts UpdateContentHeight
    // commands (notice screen -> ~470px, card-entry -> ~620px). OneInc also
    // injects a "Healthy Paws / a Chubb Company" footer image BELOW the frame.
    //
    // We must NOT report document/body scrollHeight: this page's body is
    // height:100% so it tracks the OUTER iframe we set from the parent. Using
    // scrollHeight creates a feedback loop (we grow the iframe -> body grows ->
    // scrollHeight grows -> we report bigger -> ...) that ratchets straight to
    // the parent's clamp ceiling. Instead we measure the BOTTOM EDGE of the
    // real content elements (#PortalOneFrame + footer img), which have fixed
    // pixel heights assigned by OneInc and are therefore immune to the loop.
    var _lastReportedHeight = 0;
    function findFrameEl() {
      return document.getElementById("PortalOneFrame")
        || document.querySelector("iframe[id^='PortalOne']")
        || null;
    }
    function contentHeight() {
      var bottom = 0;
      var frame = findFrameEl();
      if (frame) {
        // page isn't scrolled (scrolling disabled), so rect.bottom == content offset
        bottom = Math.max(bottom, frame.getBoundingClientRect().bottom);
      }
      // OneInc appends the sponsor footer image(s) below the frame; include them.
      var imgs = document.body ? document.body.getElementsByTagName("img") : [];
      for (var i = 0; i < imgs.length; i++) {
        bottom = Math.max(bottom, imgs[i].getBoundingClientRect().bottom);
      }
      return Math.ceil(bottom);
    }
    function reportHeight(_triggerHeight) {
      var h = contentHeight();
      if (h <= 0) h = Math.ceil(_triggerHeight || 0);
      if (h <= 0) return;
      // 12px breathing room below the footer logo so it isn't flush to the edge.
      h += 12;
      if (Math.abs(h - _lastReportedHeight) < 4) return;
      _lastReportedHeight = h;
      post("resize", { height: h });
    }
    function snapshotFrame(frame) {
      try {
        var rect = frame.getBoundingClientRect();
        return {
          id: frame.id,
          rectH: Math.ceil(rect.height),
          rectW: Math.ceil(rect.width),
          inlineH: (frame.style && frame.style.height) || "",
          inlineW: (frame.style && frame.style.width) || "",
          inlineTop: (frame.style && frame.style.top) || "",
          inlinePos: (frame.style && frame.style.position) || ""
        };
      } catch (_) { return null; }
    }
    // Also watch the document body itself — OneInc appends a "Healthy Paws"
    // footer image after the frame loads, and other late-arriving DOM bits
    // can change total height even when PortalOneFrame's own size is stable.
    function watchDocument() {
      var report = function () { reportHeight(0); };
      if (typeof MutationObserver === "function") {
        try {
          new MutationObserver(report).observe(document.body, {
            childList: true,
            subtree: true,
          });
        } catch (_) { /* ignore */ }
      }
      // ResizeObserver on body catches image-load reflows the MutationObserver
      // doesn't (the <img> node exists but its rendered size changes once the
      // bytes arrive).
      if (typeof ResizeObserver === "function") {
        try { new ResizeObserver(report).observe(document.body); } catch (_) { /* ignore */ }
      }
    }
    watchDocument();

    function watchPortalOneFrame() {
      var attempts = 0;
      function findFrame() {
        return document.getElementById("PortalOneFrame")
          || document.querySelector("iframe[id^='PortalOne']")
          || null;
      }
      function attach(frame) {
        var snap = snapshotFrame(frame);
        post("debug", { stage: "frame-attach", snap: snap });
        reportHeight(frame.getBoundingClientRect().height);
        if (typeof ResizeObserver === "function") {
          var ro = new ResizeObserver(function (entries) {
            for (var i = 0; i < entries.length; i++) {
              reportHeight(entries[i].contentRect.height);
            }
          });
          ro.observe(frame);
        }
        if (typeof MutationObserver === "function") {
          var mo = new MutationObserver(function () {
            var s = snapshotFrame(frame);
            post("debug", { stage: "frame-style-mut", snap: s });
            reportHeight(frame.getBoundingClientRect().height);
          });
          mo.observe(frame, { attributes: true, attributeFilter: ["style"] });
        }
        // Belt-and-suspenders: also report height periodically for 12s so we
        // catch the actual resize value even if Observer fires before OneInc
        // sets the explicit pixel height.
        var ticks = 0;
        var iv = setInterval(function () {
          reportHeight(frame.getBoundingClientRect().height);
          if (++ticks > 48) clearInterval(iv);
        }, 250);
      }
      function tick() {
        var f = findFrame();
        if (f) {
          post("debug", { stage: "frame-found", afterMs: attempts * 150, snap: snapshotFrame(f) });
          attach(f);
          return;
        }
        if (++attempts < 60) {
          setTimeout(tick, 150);
        } else {
          var snapshot = "";
          try { snapshot = String(document.body.innerHTML || "").slice(0, 1200); } catch (_) {}
          post("debug", { stage: "frame-not-found", afterMs: attempts * 150, bodySnapshot: snapshot });
        }
      }
      tick();
    }

    function sanitize(obj) {
      // Drop functions (e.g. acknowledge) and non-JSON-serializable values so
      // postMessage doesn't fail with DataCloneError.
      var out = {};
      for (var k in obj) {
        if (!Object.prototype.hasOwnProperty.call(obj, k)) continue;
        var v = obj[k];
        if (typeof v === "function") continue;
        try { JSON.stringify(v); out[k] = v; } catch (_) { /* skip */ }
      }
      return out;
    }

    post("ready");

    loadScript(sdkUrl)
      .then(function () {
        var $ = window.jQuery;
        if (!$ || !$.fn || !$.fn.portalOne) {
          throw new Error("jQuery PortalOne plugin not present after script load");
        }
        var $c = $("#portalOneContainer");
        // Defensive cleanup per OneInc V2 React recipe: "remove all old handlers
        // for case when dialog is reopened to avoid double handling". Safe to
        // call before init since .off() is a no-op when no handlers exist.
        try { $c.off(); } catch (_) {}
        $c.portalOne();

        var paymentCompleted = false;
        var containerEl = document.getElementById("portalOneContainer");

        // OneInc V2 dispatches events as native CustomEvent with literal dotted
        // names (e.g. "portalOne.unload"). jQuery's `.on("portalOne.unload",...)`
        // interprets the dot as a namespace and never fires. So we use plain
        // addEventListener on the container, which catches both V1 (jQuery
        // .trigger) and V2 (native CustomEvent) emissions reliably.
        function extractEventData(e) {
          if (!e) return {};
          // V2: detail-shaped CustomEvent.
          if (e.detail !== undefined) return e.detail || {};
          // V1: jQuery passes a second arg, accessible via e.originalEvent.detail
          // for native handlers, or as undefined here. Caller can pass data via
          // arguments[1] when wiring through jQuery, but we standardize on detail.
          return {};
        }

        containerEl.addEventListener("portalOne.paymentComplete", function (e) {
          var data = extractEventData(e);
          paymentCompleted = true;
          try { if (data && typeof data.acknowledge === "function") data.acknowledge(); } catch (_) {}
          var clean = sanitize(data || {});
          post("paymentComplete", { data: clean });
        });

        // V2 emits portalOne.load; V1 emits portalOne.loadComplete. Listen to both.
        function onLoad() {
          var fb = document.getElementById("petrx-frame-fallback");
          if (fb && fb.parentNode) fb.parentNode.removeChild(fb);
          post("loadComplete");
        }
        containerEl.addEventListener("portalOne.load", onLoad);
        containerEl.addEventListener("portalOne.loadComplete", onLoad);

        containerEl.addEventListener("portalOne.unload", function () {
          post("unload", { paymentCompleted: paymentCompleted });
        });

        containerEl.addEventListener("portalOne.error", function (e) {
          var data = extractEventData(e);
          post("error", {
            message: (data && (data.description || data.message || data.error)) || "portalOne.error",
            data: sanitize(data || {}),
          });
        });

        // Belt-and-suspenders: also bind via jQuery for the V1 fallback path.
        $c.on("portalOne.paymentComplete", function (_e, data) {
          if (paymentCompleted) return; // already handled via native listener
          paymentCompleted = true;
          try { if (data && typeof data.acknowledge === "function") data.acknowledge(); } catch (_) {}
          post("paymentComplete", { data: sanitize(data || {}) });
        });
        $c.on("portalOne.unload", function () {
          post("unload", { paymentCompleted: paymentCompleted });
        });

        var instance = $c.data("portalOne");
        if (!instance || typeof instance.makePayment !== "function") {
          throw new Error("portalOne instance not found after init");
        }

        var payload = {
          sessionId: sessionId,
          paymentCategory: "UserSelect",
          // V2 enums (string), NOT the V1 integer 0. V1 silently unloads if given V2 enums.
          feeContext: "PaymentWithFee",
          convenienceFeeType: "Default",
          amountContext: "AmountDueOnly",
          amountContextDefault: "minimumAmountDue",
          minAmountDue: amount,
          accountBalance: amount,
          // Do not set confirmationDisplay / acknowledgmentRequired here: Healthy
          // Paws production runs NOTICE → portal “MAKE A PAYMENT” → PAYMENT TYPE.
          // Omitting these lets OneInc apply portal defaults for the session origin.
          saveOption: "Save",
          clientReferenceData1: leadId,
          operation: "makePayment",
          displayMode: "Inline"
        };
        if (policyHolderName)     payload.policyHolderName     = policyHolderName;
        if (billingZip)           payload.billingZip           = billingZip;
        if (billingAddressStreet) payload.billingAddressStreet = billingAddressStreet;
        if (returnUrl) payload.returnUrl = returnUrl;

        // Log the literal payload so we can verify what reaches OneInc when
        // debugging notice / pre-fill behavior. Parent also receives this via
        // postMessage; logging in the iframe console too removes one layer of
        // indirection.
        try { console.info("[oneinc-frame] makePayment payload", JSON.stringify(payload)); } catch (_) {}
        post("makePayment", { payload: payload });
        instance.makePayment(payload);

        // V2's SDK doesn't fire portalOne.loadComplete reliably; instead it
        // injects <iframe id="PortalOneFrame"> and dynamically sets its height
        // as the modal content changes. We watch that iframe directly.
        watchPortalOneFrame();

        // Clear the placeholder once OneInc's iframe attaches.
        var clearFallbackWhenFrameVisible = function () {
          var p = document.getElementById("PortalOneFrame");
          if (p) {
            var fb = document.getElementById("petrx-frame-fallback");
            if (fb && fb.parentNode) fb.parentNode.removeChild(fb);
            return;
          }
          setTimeout(clearFallbackWhenFrameVisible, 150);
        };
        clearFallbackWhenFrameVisible();
      })
      .catch(function (err) {
        setFallback("We couldn't load the payment form. Please refresh the page to try again.");
        post("error", { message: (err && err.message) || String(err) });
      });
  })();
  </script>
</body>
</html>
