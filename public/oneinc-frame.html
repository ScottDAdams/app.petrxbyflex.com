<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Payment</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #portalOneContainer { position: relative; width: 100%; height: 100%; }
  #petrx-frame-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 14px; padding: 16px; text-align: center; }
</style>
</head>
<body>
  <!--
    Isolated host page for OneInc PortalOne GenericModalV2.
    Matches Healthy Paws' "/Enrollment/PaymentPage" pattern: the OneInc Angular CDK
    overlay is injected into THIS document's body, so its height:100% wrapper fills
    the iframe (not the parent app), eliminating CSS conflicts with the host React
    app. The parent app embeds this page via <iframe src="/oneinc-frame.html?..."/>
    and communicates with it via window.postMessage:
      - frame -> parent: { source: 'petrx-oneinc-frame', action: 'ready'|'loadComplete'|'paymentComplete'|'unload'|'error', ... }
      - parent -> frame: not used in V1 of this bridge (all init params come via URL query)
  -->
  <div id="portalOneContainer">
    <div id="petrx-frame-fallback">Initializing payment...</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
  (function () {
    "use strict";

    var params = new URLSearchParams(window.location.search);
    var sessionId   = params.get("sessionId") || "";
    var amount      = parseFloat(params.get("amount") || "0");
    var leadId      = params.get("leadId") || "";
    var env         = (params.get("env") || "staging").toLowerCase();
    var returnUrl   = params.get("returnUrl") || "";
    var scriptOverride = params.get("scriptUrl") || "";

    function post(action, extra) {
      try {
        var msg = { source: "petrx-oneinc-frame", action: action };
        if (extra && typeof extra === "object") {
          for (var k in extra) if (Object.prototype.hasOwnProperty.call(extra, k)) msg[k] = extra[k];
        }
        window.parent.postMessage(msg, "*");
      } catch (e) {
        // last-resort log only; parent is the only consumer
        console.error("[oneinc-frame] postMessage failed", e);
      }
    }

    function setFallback(text) {
      var el = document.getElementById("petrx-frame-fallback");
      if (el) el.textContent = text;
    }

    if (!sessionId) {
      setFallback("Payment is not available right now. Please refresh and try again.");
      post("error", { message: "missing sessionId in iframe query string" });
      return;
    }

    var host = (env === "prod" || env === "production")
      ? "https://portalone.processonepayments.com"
      : "https://stgportalone.processonepayments.com";
    var sdkUrl = scriptOverride || (host + "/GenericModalV2/PortalOne.js");

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = function () { resolve(); };
        s.onerror = function () { reject(new Error("Failed to load " + src)); };
        document.head.appendChild(s);
      });
    }

    function sanitize(obj) {
      // Drop functions (e.g. acknowledge) and non-JSON-serializable values so
      // postMessage doesn't fail with DataCloneError.
      var out = {};
      for (var k in obj) {
        if (!Object.prototype.hasOwnProperty.call(obj, k)) continue;
        var v = obj[k];
        if (typeof v === "function") continue;
        try { JSON.stringify(v); out[k] = v; } catch (_) { /* skip */ }
      }
      return out;
    }

    post("ready");

    loadScript(sdkUrl)
      .then(function () {
        var $ = window.jQuery;
        if (!$ || !$.fn || !$.fn.portalOne) {
          throw new Error("jQuery PortalOne plugin not present after script load");
        }
        var $c = $("#portalOneContainer");
        $c.portalOne();

        var paymentCompleted = false;

        $c.on("portalOne.paymentComplete", function (_e, data) {
          paymentCompleted = true;
          try { if (data && typeof data.acknowledge === "function") data.acknowledge(); } catch (_) {}
          var clean = sanitize(data || {});
          post("paymentComplete", { data: clean });
        });

        $c.on("portalOne.loadComplete", function () {
          // Clear our placeholder once the SDK has injected its UI.
          var fb = document.getElementById("petrx-frame-fallback");
          if (fb && fb.parentNode) fb.parentNode.removeChild(fb);
          post("loadComplete");
        });

        $c.on("portalOne.unload", function () {
          post("unload", { paymentCompleted: paymentCompleted });
        });

        $c.on("portalOne.error", function (_e, data) {
          post("error", { message: (data && (data.message || data.error)) || "portalOne.error", data: sanitize(data || {}) });
        });

        var instance = $c.data("portalOne");
        if (!instance || typeof instance.makePayment !== "function") {
          throw new Error("portalOne instance not found after init");
        }

        var payload = {
          sessionId: sessionId,
          paymentCategory: "UserSelect",
          // V2 enums (string), NOT the V1 integer 0. V1 silently unloads if given V2 enums.
          feeContext: "PaymentWithFee",
          convenienceFeeType: "Default",
          amountContext: "AmountDueOnly",
          amountContextDefault: "minimumAmountDue",
          minAmountDue: amount,
          accountBalance: amount,
          confirmationDisplay: true,
          saveOption: "Save",
          acknowledgmentRequired: "true",
          clientReferenceData1: leadId,
          operation: "makePayment",
          displayMode: "Modal"
        };
        if (returnUrl) payload.returnUrl = returnUrl;

        post("makePayment", { payload: payload });
        instance.makePayment(payload);
      })
      .catch(function (err) {
        setFallback("We couldn't load the payment form. Please refresh the page to try again.");
        post("error", { message: (err && err.message) || String(err) });
      });
  })();
  </script>
</body>
</html>
