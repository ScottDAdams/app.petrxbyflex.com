# Admin portal (admin.petrxbyflex.com) — proxied to Flask/gunicorn on 8080
server {
  listen 80;
  server_name admin.petrxbyflex.com;

  client_max_body_size 6m;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 120s;
  }
}

# Consumer enrollment SPA (app.petrxbyflex.com)
server {
  listen 80 default_server;
  server_name app.petrxbyflex.com _;

  root /usr/share/nginx/html;
  index index.html;

  # Liveness probe for Fly health checks + external uptime monitoring.
  # Cheap explicit 200 (doesn't serve the SPA shell); host-independent because
  # this is the default_server, so Fly's internal check always reaches it.
  location = /healthz {
    access_log off;
    add_header Content-Type application/json;
    return 200 '{"status":"ok","service":"app-petrxbyflex-com"}';
  }

  location ^~ /assets/breed-avatars/ {
    alias /data/breed-avatars/;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 6M;
    add_header Cache-Control "public";
  }
}
