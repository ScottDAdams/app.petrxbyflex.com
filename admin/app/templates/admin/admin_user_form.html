{% extends "admin/base.html" %}
{% block title %}Add Admin — PetRx Admin{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="{{ url_for('admin.admin_users_list') }}" class="text-sm text-brand hover:underline">← Admin users</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-1">Add admin</h1>
</div>

<form method="POST" class="max-w-md bg-white rounded-xl border border-gray-200 p-6 space-y-4">
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
    <input type="email" name="email" required autocomplete="off"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">Display name (optional)</label>
    <input type="text" name="display_name"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">Password</label>
    <input type="password" name="password" required minlength="8" autocomplete="new-password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
    <p class="text-xs text-gray-400 mt-1">At least 8 characters.</p>
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">Confirm password</label>
    <input type="password" name="password_confirm" required minlength="8" autocomplete="new-password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
  </div>
  <button type="submit"
          class="w-full bg-brand text-white text-sm font-medium py-2 rounded-lg hover:bg-brand-dark">
    Create admin
  </button>
</form>
{% endblock %}
