{% extends "admin/base.html" %}
{% block title %}Set Password — PetRx Admin{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="{{ url_for('admin.admin_users_list') }}" class="text-sm text-brand hover:underline">← Admin users</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-1">Set password</h1>
  <p class="text-sm font-mono text-gray-500 mt-1">{{ user.email }}</p>
</div>

<form method="POST" class="max-w-md bg-white rounded-xl border border-gray-200 p-6 space-y-4">
  {% if not is_self %}
  <p class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
    You are resetting another admin’s password. Share the new password with them securely.
  </p>
  {% endif %}
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">New password</label>
    <input type="password" name="password" required minlength="8" autocomplete="new-password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-500 mb-1">Confirm new password</label>
    <input type="password" name="password_confirm" required minlength="8" autocomplete="new-password"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand" />
  </div>
  <button type="submit"
          class="w-full bg-brand text-white text-sm font-medium py-2 rounded-lg hover:bg-brand-dark">
    Update password
  </button>
</form>
{% endblock %}
