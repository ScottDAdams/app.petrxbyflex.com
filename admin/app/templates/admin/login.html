<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetRx Admin — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#2563eb' } } } }
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="{{ logo_url }}"
           alt="PetRx by Flex" class="h-10 w-auto mx-auto mb-4" />
      <p class="text-sm text-gray-500">Sign in to continue</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-50 text-red-700 text-sm rounded-md border border-red-200">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autofocus
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-brand" />
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-brand" />
        </div>
        <button type="submit"
                class="w-full bg-brand hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md text-sm">
          Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
